<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>The Sonder Assessment — Organizational Health in 10 Minutes</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="A 10-minute diagnostic across the ten pillars of organizational health. Get an immediate score and see where to focus first.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=Source+Sans+3:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --sage:      #859473;
    --sage-80:   #a7b297;
    --sage-30:   #e0e5d8;
    --sage-10:   #f3f5ee;
    --ivory:     #efeae1;
    --paper:     #f8f5ee;
    --evergreen: #2d3d32;
    --stone:     #7b7b73;
    --stone-40:  #c8c7c1;
    --ink:       #2a2e29;
    --rule:      rgba(45,61,50,0.16);
    --rule-soft: rgba(45,61,50,0.09);
    --amber:     #b9893f;
    --serif: "Cormorant Garamond", Georgia, serif;
    --sans: "Source Sans 3", "Helvetica Neue", Helvetica, Arial, sans-serif;
  }
  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0; background: var(--paper); color: var(--ink);
    font-family: var(--sans); -webkit-font-smoothing: antialiased;
    min-height: 100vh; display: flex; flex-direction: column;
  }
  a { color: inherit; text-decoration: none; }
  .serif-i { font-family: var(--serif); font-style: italic; font-weight: 300; }

  /* ===== Top bar ===== */
  header.bar {
    display: flex; align-items: center; justify-content: space-between;
    padding: 20px 40px; border-bottom: 1px solid var(--rule-soft);
    position: sticky; top: 0; background: rgba(248,245,238,0.9); backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px); z-index: 30;
  }
  header.bar .brand { display: flex; align-items: center; gap: 12px; }
  header.bar .brand .ic { width: 30px; height: 30px; background: url('assets/logo-icon.png') no-repeat center / contain; }
  header.bar .brand .wm { font-family: var(--serif); font-size: 18px; letter-spacing: 0.3em; text-indent: 0.3em; color: var(--evergreen); }
  header.bar .back { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); transition: color .3s; }
  header.bar .back:hover { color: var(--evergreen); }

  /* ===== Progress ===== */
  .progress { height: 2px; background: var(--sage-30); position: sticky; top: 71px; z-index: 29; }
  .progress .fill { height: 100%; width: 0; background: var(--sage); transition: width .5s cubic-bezier(.2,.7,.2,1); }

  /* ===== Stage ===== */
  main { flex: 1; display: flex; align-items: flex-start; justify-content: center; padding: 56px 28px 80px; }
  .stage { width: 100%; max-width: 760px; }
  .screen { animation: fade .55s cubic-bezier(.2,.7,.2,1) both; }
  @keyframes fade { from { transform: translateY(16px); } to { transform: none; } }

  .eyebrow { font-weight: 500; font-size: 11px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--sage); }
  h1.big {
    font-family: var(--serif); font-weight: 300; line-height: 1.04; letter-spacing: -0.015em;
    font-size: clamp(38px, 5.6vw, 66px); margin: 18px 0 0; color: var(--evergreen); max-width: 15ch;
  }
  h1.big em { font-style: italic; color: var(--sage); }
  p.lede { font-size: 18px; line-height: 1.7; color: var(--evergreen); max-width: 56ch; margin: 26px 0 0; }

  /* buttons */
  .btn {
    display: inline-flex; align-items: center; gap: 12px; cursor: pointer;
    font-family: var(--sans); font-weight: 500; font-size: 12px; letter-spacing: 0.22em; text-transform: uppercase;
    padding: 17px 30px; border: 1px solid var(--evergreen); background: var(--evergreen); color: var(--ivory);
    transition: background .4s ease, color .4s ease, transform .4s ease, opacity .3s ease;
  }
  .btn:hover { background: transparent; color: var(--evergreen); }
  .btn .arrow { transition: transform .4s ease; }
  .btn:hover .arrow { transform: translateX(5px); }
  .btn.ghost { background: transparent; color: var(--evergreen); }
  .btn.ghost:hover { background: var(--evergreen); color: var(--ivory); }
  .btn[disabled] { opacity: 0.32; pointer-events: none; }

  .intro-list { list-style: none; padding: 0; margin: 40px 0 0; display: grid; gap: 2px; border-top: 1px solid var(--rule); }
  .intro-list li { display: grid; grid-template-columns: 40px 1fr; gap: 16px; align-items: baseline; padding: 20px 4px; border-bottom: 1px solid var(--rule-soft); }
  .intro-list li .n { font-family: var(--serif); font-style: italic; font-size: 19px; color: var(--sage); }
  .intro-list li p { margin: 0; font-size: 16px; line-height: 1.55; color: var(--evergreen); }
  .intro-meta { display: flex; gap: 36px; margin: 36px 0 40px; flex-wrap: wrap; }
  .intro-meta .m .v { font-family: var(--serif); font-size: 30px; color: var(--evergreen); line-height: 1; }
  .intro-meta .m .k { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); margin-top: 8px; }
  .start-row { margin-top: 8px; }

  /* question screen */
  .qhead { display: flex; align-items: baseline; justify-content: space-between; gap: 20px; margin-bottom: 8px; }
  .qhead .step { font-size: 11px; letter-spacing: 0.24em; text-transform: uppercase; color: var(--stone); }
  .qhead .pillarname { font-family: var(--serif); font-style: italic; font-size: 19px; color: var(--sage); text-align: right; }
  h2.qtitle { font-family: var(--serif); font-weight: 300; font-size: clamp(28px, 4vw, 44px); line-height: 1.1; letter-spacing: -0.01em; color: var(--evergreen); margin: 6px 0 4px; }
  .qtitle-sub { font-size: 15px; line-height: 1.6; color: var(--stone); margin: 0 0 40px; max-width: 52ch; }

  .qblock { margin-bottom: 36px; }
  .qblock .stmt { font-family: var(--serif); font-weight: 400; font-size: clamp(20px, 2.4vw, 27px); line-height: 1.32; color: var(--evergreen); margin: 0 0 18px; }
  .scale { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
  .scale button {
    font-family: var(--sans); font-size: 13px; font-weight: 500; cursor: pointer;
    padding: 16px 10px; border: 1px solid var(--rule); background: transparent; color: var(--evergreen);
    line-height: 1.3; transition: background .3s ease, border-color .3s ease, color .3s ease, transform .3s ease;
  }
  .scale button:hover { border-color: var(--sage); background: var(--sage-10); }
  .scale button.sel { background: var(--evergreen); border-color: var(--evergreen); color: var(--ivory); }
  .nav-row { display: flex; align-items: center; justify-content: space-between; margin-top: 44px; padding-top: 26px; border-top: 1px solid var(--rule); }
  .nav-row .lnk { background: none; border: 0; cursor: pointer; font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); transition: color .3s; }
  .nav-row .lnk:hover { color: var(--evergreen); }
  .nav-row .lnk[disabled] { opacity: 0.3; pointer-events: none; }

  /* capture form */
  .cap-form { margin: 38px 0 0; display: grid; grid-template-columns: 1fr 1fr; gap: 26px; }
  .cap-form .field { display: flex; flex-direction: column; gap: 8px; }
  .cap-form .field.full { grid-column: 1 / -1; }
  .cap-form label { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone); }
  .cap-form input {
    background: transparent; border: 0; border-bottom: 1px solid var(--rule); color: var(--ink);
    font-family: var(--sans); font-size: 17px; padding: 9px 0; transition: border-color .3s;
  }
  .cap-form input::placeholder { color: var(--stone-40); }
  .cap-form input:focus { outline: none; border-color: var(--sage); }
  .cap-note { font-size: 13px; color: var(--stone); margin: 26px 0 0; line-height: 1.5; }

  /* results */
  .score-hero { display: grid; grid-template-columns: auto 1fr; gap: 44px; align-items: center; margin: 36px 0 12px; }
  .ring { position: relative; width: 184px; height: 184px; }
  .ring svg { transform: rotate(-90deg); }
  .ring .num { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
  .ring .num .v { font-family: var(--serif); font-weight: 300; font-size: 56px; line-height: 1; color: var(--evergreen); }
  .ring .num .o { font-size: 11px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); margin-top: 4px; }
  .score-hero .tier { font-family: var(--serif); font-style: italic; font-size: 26px; color: var(--sage); margin: 0 0 10px; }
  .score-hero p { font-size: 16px; line-height: 1.6; color: var(--evergreen); margin: 0; }

  .bars { margin: 40px 0 0; border-top: 1px solid var(--rule); }
  .bar-row { display: grid; grid-template-columns: 1fr 120px; gap: 20px; align-items: center; padding: 16px 4px; border-bottom: 1px solid var(--rule-soft); }
  .bar-row .nm { font-size: 15px; color: var(--evergreen); }
  .bar-row .nm .pn { font-family: var(--serif); font-style: italic; color: var(--sage); margin-right: 10px; }
  .bar-row .track { height: 6px; background: var(--sage-30); position: relative; }
  .bar-row .track .fl { height: 100%; background: var(--sage); width: 0; transition: width .9s cubic-bezier(.2,.7,.2,1); }
  .bar-row.risk .track .fl { background: var(--amber); }

  .focus { margin: 44px 0 0; background: var(--evergreen); color: var(--ivory); padding: 40px 38px; }
  .focus .eyebrow { color: var(--sage-80); }
  .focus h3 { font-family: var(--serif); font-weight: 300; font-size: 30px; margin: 12px 0 24px; }
  .focus ol { margin: 0; padding: 0; list-style: none; display: grid; gap: 16px; }
  .focus ol li { display: grid; grid-template-columns: 30px 1fr; gap: 14px; align-items: baseline; padding-bottom: 16px; border-bottom: 1px solid rgba(239,234,225,0.16); }
  .focus ol li:last-child { border-bottom: 0; padding-bottom: 0; }
  .focus ol li .pn { font-family: var(--serif); font-style: italic; font-size: 18px; color: var(--sage-80); }
  .focus ol li .ft { font-size: 16px; }
  .focus ol li .ft strong { display: block; font-size: 17px; margin-bottom: 3px; }
  .focus ol li .ft span { color: rgba(239,234,225,0.75); font-size: 14px; line-height: 1.5; }
  .result-cta { display: flex; flex-wrap: wrap; gap: 16px; align-items: center; margin: 40px 0 0; }
  .result-cta .retake { background: none; border: 0; cursor: pointer; font-family: var(--sans); font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); }
  .result-cta .retake:hover { color: var(--evergreen); }
  .emailed { color: var(--sage); font-family: var(--serif); font-style: italic; font-size: 17px; margin: 20px 0 26px; }

  footer.foot { text-align: center; padding: 30px; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--stone); border-top: 1px solid var(--rule-soft); }

  @media (max-width: 640px) {
    header.bar { padding: 16px 22px; }
    main { padding: 36px 20px 60px; }
    .scale { grid-template-columns: 1fr 1fr; }
    .cap-form { grid-template-columns: 1fr; }
    .score-hero { grid-template-columns: 1fr; gap: 24px; text-align: center; }
    .ring { margin: 0 auto; }
    .bar-row { grid-template-columns: 1fr 90px; }
    .progress { top: 63px; }
  }
</style>
</head>
<body>
<header class="bar">
  <a class="brand" href="Sonder Operations.html" aria-label="Sonder Operations home">
    <span class="ic"></span>
    <span class="wm">SONDER</span>
  </a>
  <a class="back" href="Sonder Operations.html">← Back to site</a>
</header>
<div class="progress"><div class="fill" id="progFill"></div></div>

<main>
  <div class="stage" id="stage"></div>
</main>

<footer class="foot">© 2026 Sonder Operations · The Sonder Assessment</footer>

<script>
  /* ---------- Data ---------- */
  const PILLARS = [
    { name: "HR Technology & AI Integration", statements: [
      "Our core systems (HRIS, payroll, ATS) are integrated and share data cleanly.",
      "Our team actually uses the AI tools we pay for — not just licenses them." ] },
    { name: "Talent Acquisition & Workforce Planning", statements: [
      "We plan hiring ahead of need rather than scrambling to backfill.",
      "Our key roles have a clear succession plan if someone leaves." ] },
    { name: "Process Documentation & Workflow Design", statements: [
      "Our core processes are documented, not living in people's heads.",
      "If a key person left tomorrow, the work would continue without chaos." ] },
    { name: "Compensation & Total Rewards", statements: [
      "Our pay structure is consistent, transparent, and defensible.",
      "We rarely lose high performers over compensation." ] },
    { name: "Performance Management", statements: [
      "Every employee knows what success looks like in their role.",
      "We measure performance consistently, not just at review time." ] },
    { name: "Learning & Development", statements: [
      "We invest in growing our people's capabilities intentionally.",
      "Our team is keeping pace with the skills our market demands." ] },
    { name: "Organizational Design & Structure", statements: [
      "Ownership, accountability, and decision rights are clear across the org.",
      "Decisions don't all funnel through the founder or a single leader." ] },
    { name: "Change Management & Adoption", statements: [
      "When we roll out change, people actually adopt it.",
      "New initiatives stick rather than fading after a few weeks." ] },
    { name: "AI Governance & Ethics Policy", statements: [
      "We have clear guidelines for how AI can and cannot be used.",
      "Our people understand the rules around data and AI in their daily work." ] },
    { name: "Measurement, Reporting & Continuous Improvement", statements: [
      "We track the metrics that actually matter to the business.",
      "We regularly act on what our data tells us to improve." ] }
  ];
  const FOCUS_MOVES = [
    "Audit what you own before you buy anything new. Most teams are sitting on capability they haven't switched on.",
    "Build a simple workforce plan tied to your growth — so the next hire is a decision, not a fire drill.",
    "Capture your highest-risk processes first: the ones that live in one person's head.",
    "Make pay bands explicit. Clarity retains people more cheaply than counteroffers.",
    "Define what 'good' looks like for every role, in writing, before the next review cycle.",
    "Pick the two capabilities your market will demand next, and build a path to them.",
    "Map decision rights. Name who owns what — and get it off the founder's plate.",
    "Pair every rollout with an adoption plan, not just an announcement.",
    "Write a one-page AI use policy. Guardrails make adoption faster, not slower.",
    "Choose a handful of metrics that matter and review them on a fixed cadence."
  ];
  const SCALE = ["Strongly disagree", "Disagree", "Agree", "Strongly agree"];
  const KEY = "sonderAssessment_v1";

  /* ---------- State ---------- */
  let state = { step: "intro", pillar: 0, answers: {}, lead: null };
  try { const saved = JSON.parse(localStorage.getItem(KEY)); if (saved && saved.answers) state = saved; } catch(e){}
  function save() { try { localStorage.setItem(KEY, JSON.stringify(state)); } catch(e){} }

  const stage = document.getElementById('stage');
  const progFill = document.getElementById('progFill');

  function setProgress() {
    let pct = 0;
    if (state.step === "intro") pct = 0;
    else if (state.step === "pillars") pct = (state.pillar / PILLARS.length) * 88;
    else if (state.step === "capture") pct = 90;
    else if (state.step === "results") pct = 100;
    progFill.style.width = pct + "%";
  }

  /* ---------- Scoring ---------- */
  function pillarScore(i) {
    const a = state.answers[i] || [];
    if (a[0] == null || a[1] == null) return null;
    return Math.round(((a[0] + a[1]) / 8) * 100); // 0-100
  }
  function overall() {
    const s = PILLARS.map((_, i) => pillarScore(i));
    const valid = s.filter(v => v != null);
    if (!valid.length) return 0;
    return Math.round(valid.reduce((x, y) => x + y, 0) / valid.length);
  }
  function tierFor(score) {
    if (score >= 75) return { label: "Strong Foundation", note: "Your systems are largely keeping pace with your growth. The opportunity now is refinement — sharpening the few areas holding you back from your next stage." };
    if (score >= 55) return { label: "Developing", note: "The bones are there, but the systems aren't yet carrying the weight your growth demands. A focused effort on your lowest pillars would compound quickly." };
    if (score >= 40) return { label: "Under Strain", note: "Your people are likely compensating for systems that haven't caught up. This is the exact growth stage Sonder was built for." };
    return { label: "At a Turning Point", note: "Several foundational systems need attention before they become a ceiling on growth. The good news: the path forward is clear, and the gains are fast." };
  }

  /* ---------- Render ---------- */
  function render() {
    setProgress();
    if (state.step === "intro") return renderIntro();
    if (state.step === "pillars") return renderPillar();
    if (state.step === "capture") return renderCapture();
    if (state.step === "results") return renderResults();
  }

  function renderIntro() {
    const started = Object.keys(state.answers).length > 0;
    stage.innerHTML = `
      <div class="screen">
        <span class="eyebrow">The Sonder Assessment</span>
        <h1 class="big">Where does your organization <em>actually</em> stand?</h1>
        <p class="lede">Ten minutes. Twenty honest questions. A clear score across all ten pillars of organizational health — and the two or three places to focus first.</p>
        <div class="intro-meta">
          <div class="m"><div class="v">10</div><div class="k">Pillars<br>Scored</div></div>
          <div class="m"><div class="v">~10</div><div class="k">Minutes<br>to Complete</div></div>
          <div class="m"><div class="v">1</div><div class="k">Custom<br>Snapshot</div></div>
        </div>
        <ul class="intro-list">
          <li><span class="n">i</span><p>Rate a set of plain-spoken statements about how your organization runs today.</p></li>
          <li><span class="n">ii</span><p>See your Sonder Health Score and a pillar-by-pillar breakdown the moment you finish.</p></li>
          <li><span class="n">iii</span><p>Leave with a prioritized starting point — and the option to talk it through with us.</p></li>
        </ul>
        <div class="start-row" style="margin-top:40px;">
          <button class="btn" id="startBtn">${started ? 'Resume Assessment' : 'Begin Assessment'} <span class="arrow">→</span></button>
          ${started ? '<button class="btn ghost" id="restartBtn" style="margin-left:14px;">Start Over</button>' : ''}
        </div>
      </div>`;
    document.getElementById('startBtn').onclick = () => { state.step = "pillars"; if (!started) state.pillar = 0; save(); render(); window.scrollTo(0,0); };
    const rb = document.getElementById('restartBtn');
    if (rb) rb.onclick = () => { state = { step: "pillars", pillar: 0, answers: {}, lead: null }; save(); render(); window.scrollTo(0,0); };
  }

  function renderPillar() {
    const i = state.pillar;
    const p = PILLARS[i];
    const ans = state.answers[i] || [null, null];
    stage.innerHTML = `
      <div class="screen">
        <div class="qhead">
          <span class="step">Pillar ${String(i+1).padStart(2,'0')} / ${PILLARS.length}</span>
          <span class="pillarname">${p.name}</span>
        </div>
        <h2 class="qtitle">${p.name}</h2>
        <p class="qtitle-sub">Answer honestly — there are no right answers, only an accurate picture.</p>
        ${p.statements.map((s, si) => `
          <div class="qblock">
            <p class="stmt">${s}</p>
            <div class="scale" data-si="${si}">
              ${SCALE.map((lab, vi) => `<button data-val="${vi+1}" class="${ans[si] === vi+1 ? 'sel' : ''}">${lab}</button>`).join('')}
            </div>
          </div>`).join('')}
        <div class="nav-row">
          <button class="lnk" id="backBtn" ${i === 0 ? 'disabled' : ''}>← Back</button>
          <button class="btn" id="nextBtn" ${(ans[0] && ans[1]) ? '' : 'disabled'}>${i === PILLARS.length - 1 ? 'See My Results' : 'Next Pillar'} <span class="arrow">→</span></button>
        </div>
      </div>`;
    stage.querySelectorAll('.scale').forEach(sc => {
      const si = +sc.dataset.si;
      sc.querySelectorAll('button').forEach(b => {
        b.onclick = () => {
          const cur = state.answers[i] || [null, null];
          cur[si] = +b.dataset.val;
          state.answers[i] = cur;
          save();
          sc.querySelectorAll('button').forEach(x => x.classList.remove('sel'));
          b.classList.add('sel');
          const a = state.answers[i];
          document.getElementById('nextBtn').toggleAttribute('disabled', !(a[0] && a[1]));
        };
      });
    });
    document.getElementById('backBtn').onclick = () => { if (i > 0) { state.pillar--; save(); render(); window.scrollTo(0,0); } };
    document.getElementById('nextBtn').onclick = () => {
      if (i === PILLARS.length - 1) { state.step = "capture"; }
      else { state.pillar++; }
      save(); render(); window.scrollTo(0,0);
    };
  }

  function renderCapture() {
    const l = state.lead || {};
    stage.innerHTML = `
      <div class="screen">
        <span class="eyebrow">Almost There</span>
        <h1 class="big">Your results are <em>ready.</em></h1>
        <p class="lede">Tell us where to send the full report — a pillar-by-pillar breakdown with notes on what each score means for a company your size.</p>
        <form class="cap-form" id="capForm">
          <div class="field"><label for="c-name">Full Name</label><input id="c-name" type="text" placeholder="Your name" required value="${l.name || ''}"></div>
          <div class="field"><label for="c-email">Work Email</label><input id="c-email" type="email" placeholder="you@company.com" required value="${l.email || ''}"></div>
          <div class="field"><label for="c-company">Company</label><input id="c-company" type="text" placeholder="Company name" value="${l.company || ''}"></div>
          <div class="field"><label for="c-role">Your Role</label><input id="c-role" type="text" placeholder="e.g. Founder, COO" value="${l.role || ''}"></div>
          <div class="field full" style="margin-top:8px;">
            <button class="btn" type="submit" style="align-self:flex-start;">Reveal My Score <span class="arrow">→</span></button>
          </div>
        </form>
        <p class="cap-note">We'll email your full report and occasional insights. No spam, and you can unsubscribe anytime.<br>Prefer to skip? <button class="lnk" id="skipBtn" style="padding:0;display:inline;">See results without the report →</button></p>
      </div>`;
    document.getElementById('capForm').onsubmit = (e) => {
      e.preventDefault();
      state.lead = {
        name: document.getElementById('c-name').value.trim(),
        email: document.getElementById('c-email').value.trim(),
        company: document.getElementById('c-company').value.trim(),
        role: document.getElementById('c-role').value.trim()
      };
      state.step = "results"; save(); render(); window.scrollTo(0,0);
    };
    document.getElementById('skipBtn').onclick = () => { state.step = "results"; save(); render(); window.scrollTo(0,0); };
  }

  function renderResults() {
    const score = overall();
    const tier = tierFor(score);
    const scored = PILLARS.map((p, i) => ({ i, name: p.name, score: pillarScore(i) || 0 }));
    const focus = [...scored].sort((a, b) => a.score - b.score).slice(0, 3);
    const C = 2 * Math.PI * 78;
    const firstName = (state.lead && state.lead.name) ? state.lead.name.split(' ')[0] : '';

    stage.innerHTML = `
      <div class="screen">
        <span class="eyebrow">Your Sonder Health Score</span>
        <h1 class="big" style="font-size:clamp(32px,4.4vw,54px);">${firstName ? firstName + ", here's" : "Here's"} where you <em>stand.</em></h1>
        ${state.lead ? `<p class="emailed">✓ A full report is on its way to ${state.lead.email}.</p>` : ''}
        <div class="score-hero">
          <div class="ring">
            <svg width="184" height="184" viewBox="0 0 184 184">
              <circle cx="92" cy="92" r="78" fill="none" stroke="rgba(45,61,50,0.12)" stroke-width="10"/>
              <circle id="ringFill" cx="92" cy="92" r="78" fill="none" stroke="var(--sage)" stroke-width="10" stroke-linecap="round" stroke-dasharray="${C}" stroke-dashoffset="${C}"/>
            </svg>
            <div class="num"><span class="v" id="scoreNum">0</span><span class="o">out of 100</span></div>
          </div>
          <div>
            <p class="tier">${tier.label}</p>
            <p>${tier.note}</p>
          </div>
        </div>
        <div class="bars" id="bars">
          ${scored.map(s => {
            const risk = s.score < 55;
            return `<div class="bar-row ${risk ? 'risk' : ''}">
              <div class="nm"><span class="pn">${String(s.i+1).padStart(2,'0')}</span>${s.name}</div>
              <div class="track"><div class="fl" data-w="${s.score}"></div></div>
            </div>`;
          }).join('')}
        </div>
        <div class="focus">
          <span class="eyebrow">Where to Focus First</span>
          <h3>Your three highest-leverage moves.</h3>
          <ol>
            ${focus.map(f => `<li><span class="pn">${String(f.i+1).padStart(2,'0')}</span><span class="ft"><strong>${f.name}</strong><span>${FOCUS_MOVES[f.i]}</span></span></li>`).join('')}
          </ol>
        </div>
        <div class="result-cta">
          <a class="btn" href="Sonder Operations.html#contact">Book a Discovery Call <span class="arrow">→</span></a>
          <button class="retake" id="retakeBtn">Retake the Assessment</button>
        </div>
      </div>`;

    // Set final state synchronously so it's correct even where rAF/animation is throttled.
    const off = C - (score / 100) * C;
    const ring = document.getElementById('ringFill');
    ring.style.strokeDashoffset = off;
    document.getElementById('scoreNum').textContent = score;
    stage.querySelectorAll('.fl').forEach(fl => { fl.style.width = fl.dataset.w + "%"; });
    document.getElementById('retakeBtn').onclick = () => { state = { step: "intro", pillar: 0, answers: {}, lead: null }; save(); render(); window.scrollTo(0,0); };
  }

  render();
</script>
</body>
</html>
