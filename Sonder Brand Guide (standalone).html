  <style>

  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

3';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"e47418c6-20d2-4367-a1b5-d4c4fdeed081\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n<\u002Fstyle>\n\n\n<style>\n  :root {\n    --sage:      #859473;\n    --sage-80:   #a7b297;\n    --sage-60:   #c2cbb6;\n    --sage-30:   #e0e5d8;\n    --sage-10:   #f3f5ee;\n    --ivory:     #efeae1;\n    --paper:     #f8f5ee;\n    --evergreen: #2d3d32;\n    --evergreen-80: #4c5b50;\n    --stone:     #7b7b73;\n    --stone-40:  #c8c7c1;\n    --navy:      #1f2451;\n    --tan:       #d4b89c;\n    --ink:       #2a2e29;\n    --rule:      rgba(45,61,50,0.18);\n    --rule-soft: rgba(45,61,50,0.10);\n\n    --serif: \"Cormorant Garamond\", Georgia, serif;\n    --sans: \"Source Sans 3\", \"Helvetica Neue\", Helvetica, Arial, sans-serif;\n  }\n\n  html, body { margin:0; padding:0; }\n  body {\n    background: #d8ddcd;\n    color: var(--ink);\n    font-family: var(--sans);\n    -webkit-font-smoothing: antialiased;\n  }\n\n  /* ============ Logo (real assets) ============ */\n  /* logo-full.png and logo-icon.png are pure-black PNGs with a transparent\n     background. We flip them to ivory using filter: invert(1) on dark surfaces. */\n  .logo {\n    display: block;\n    background: no-repeat center / contain;\n    width: 100%;\n  }\n  .logo.full { background-image: url(\"4c77091e-0ad3-4f2a-9caf-6f577d511772\"); aspect-ratio: 1/1; }\n  .logo.icon { background-image: url(\"8ddec14a-efda-458f-b5cc-0940b2c6f40f\"); aspect-ratio: 1/1; }\n  .logo.light { filter: none; }            /* black ink, default */\n  .logo.ivory { filter: invert(1); }       /* white-ish ink for dark bg */\n  /* Sage-on-ivory ink (for \"logo color palette\" specimen squares only) */\n  .logo.sage {\n    filter: invert(56%) sepia(11%) saturate(644%) hue-rotate(45deg) brightness(94%) contrast(86%);\n  }\n\n  /* ============ Page shell ============ */\n  .doc {\n    max-width: 1320px;\n    margin: 60px auto;\n    padding: 0 40px 80px;\n    display: flex;\n    flex-direction: column;\n    gap: 40px;\n  }\n\n  .page {\n    background: var(--paper);\n    box-shadow: 0 20px 60px rgba(45,61,50,0.18), 0 2px 6px rgba(45,61,50,0.08);\n    position: relative;\n    overflow: hidden;\n  }\n  .page.tall { aspect-ratio: 1 / 1.294; }\n  .page.wide { aspect-ratio: 1.55 / 1; }\n\n  .page-pad { padding: 64px 72px; box-sizing: border-box; height: 100%; }\n\n  .pagefoot {\n    position: absolute;\n    left: 72px; right: 72px; bottom: 28px;\n    display: flex; justify-content: space-between;\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    opacity: 0.55;\n  }\n\n  /* ============ Type primitives ============ */\n  .eyebrow {\n    font-weight: 500;\n    font-size: 11px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n  }\n  h1.section {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 64px;\n    line-height: 1.02;\n    letter-spacing: -0.005em;\n    margin: 0 0 12px;\n  }\n  h1.section em, .lede em, .toc h1 em { font-style: italic; }\n  .lede {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-style: italic;\n    font-size: 22px;\n    line-height: 1.45;\n    color: var(--evergreen-80);\n    max-width: 56ch;\n    margin: 0;\n  }\n  p.body {\n    font-size: 14.5px;\n    line-height: 1.65;\n    color: var(--evergreen);\n    max-width: 62ch;\n    margin: 0;\n  }\n  .label {\n    font-weight: 500;\n    font-size: 10.5px;\n    letter-spacing: 0.24em;\n    text-transform: uppercase;\n    color: var(--evergreen);\n  }\n  .meta {\n    font-size: 11px;\n    letter-spacing: 0.12em;\n    color: var(--stone);\n    text-transform: uppercase;\n  }\n\n  .rule-title {\n    display: grid;\n    grid-template-columns: 1fr auto 1fr;\n    align-items: center;\n    gap: 28px;\n  }\n  .rule-title .line { height: 1px; background: currentColor; opacity: 0.5; }\n  .rule-title .t {\n    font-size: 13px;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n  }\n\n  hr.thin { border: none; border-top: 1px solid var(--rule); margin: 0; }\n\n  /* ============ Cover ============ */\n  .cover { background: var(--sage); color: var(--ivory); }\n  .cover .page-pad {\n    display: grid;\n    grid-template-rows: auto 1fr auto;\n  }\n  .cover .top, .cover .bot { display:flex; justify-content: space-between; align-items: center; }\n  .cover .mid { display:flex; flex-direction:column; justify-content:center; align-items:center; gap: 32px; }\n  .cover .mid .logo { width: 380px; }\n  .cover .mid .kicker {\n    font-size: 12px;\n    letter-spacing: 0.6em;\n    text-transform: uppercase;\n    padding: 14px 0;\n    border-top: 1px solid rgba(239,234,225,0.45);\n    border-bottom: 1px solid rgba(239,234,225,0.45);\n    min-width: 360px;\n    text-align: center;\n    margin-top: 8px;\n  }\n  .cover .bot { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase; opacity: 0.88; }\n  .cover .bot > div:nth-child(2) { text-align: center; }\n  .cover .bot > div:nth-child(3) { text-align: right; }\n\n  /* ============ TOC ============ */\n  .toc .page-pad { display: grid; grid-template-rows: auto 1fr auto; gap: 40px; }\n  .toc h1 {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 88px;\n    line-height: 1;\n    margin: 0;\n    color: var(--evergreen);\n  }\n  .toc-row {\n    display:grid; grid-template-columns: 50px 1fr 60px;\n    align-items: baseline;\n    padding: 22px 0;\n    border-top: 1px solid var(--rule);\n    gap: 24px;\n  }\n  .toc-row:last-child { border-bottom: 1px solid var(--rule); }\n  .toc-row .num { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 28px; color: var(--sage); }\n  .toc-row .tt { font-family: var(--serif); font-weight: 300; font-size: 36px; color: var(--evergreen); }\n  .toc-row .tt em { font-style: italic; }\n  .toc-row .pg { font-size: 12px; letter-spacing: 0.18em; color: var(--stone); text-align:right; }\n\n  /* ============ Brand Board ============ */\n  .board .page-pad {\n    display: grid;\n    grid-template-columns: 1fr 1fr 1fr;\n    gap: 56px;\n  }\n  .board .col { display:flex; flex-direction:column; gap: 28px; }\n  .board h3 {\n    font-family: var(--serif);\n    font-style: italic;\n    font-weight: 400;\n    font-size: 26px;\n    margin: 0 0 6px;\n    color: var(--evergreen);\n    text-align: center;\n  }\n  .board .titlewrap { text-align: center; }\n  .board .titlewrap hr { border:none; border-top:1px solid var(--rule); margin: 14px 0 0; }\n  .board .hero-mark { display:flex; align-items:center; justify-content:center; padding: 8px 0 4px; }\n  .board .hero-mark .logo { width: 78%; }\n\n  .board .palette { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; }\n  .board .swatch { display:flex; flex-direction:column; gap:8px; }\n  .board .swatch .chip { aspect-ratio: 1.3 / 1; border: 1px solid var(--rule-soft); }\n  .board .swatch .nm { font-size: 12px; font-weight: 600; color: var(--evergreen); }\n  .board .swatch .hex { font-size: 9.5px; letter-spacing: 0.08em; color: var(--stone); text-transform: uppercase; }\n\n  .board .specimen { display:flex; flex-direction:column; align-items:center; gap: 14px; }\n  .board .specimen .label-tiny { font-size: 9.5px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--stone); }\n  .board .specimen .typesample { font-family: var(--serif); font-weight: 300; font-size: 72px; line-height: 1; color: var(--evergreen); letter-spacing: 0.04em; }\n  .board .specimen .typesample em { font-style: italic; }\n  .board .specimen .sansample {\n    font-family: var(--sans);\n    font-weight: 600;\n    font-size: 22px;\n    letter-spacing: 0.32em;\n    text-transform: uppercase;\n    color: var(--evergreen);\n  }\n  .board .specimen .meta-row { font-size: 10px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); }\n\n  .board .variations { display:flex; flex-direction:column; gap: 28px; align-items:center; }\n  .board .variations .full { width: 80%; }\n  .board .variations .stacked { width: 55%; }\n\n  .board .onColor { display:grid; grid-template-columns: repeat(3, 1fr); gap: 14px; }\n  .board .onColor .oc { display:flex; flex-direction:column; gap: 8px; }\n  .board .onColor .oc .square { aspect-ratio:1; display:flex; align-items:center; justify-content:center; border: 1px solid var(--rule-soft); padding: 16%; box-sizing: border-box; }\n  .board .onColor .oc .nm { font-size: 11px; font-weight: 600; color: var(--evergreen); }\n  .board .onColor .oc .hex { font-size: 9.5px; letter-spacing: 0.08em; color: var(--stone); text-transform: uppercase; }\n\n  .board .iconRow { display:flex; align-items:center; gap: 20px; }\n  .board .iconRow .pair { display:flex; flex-direction:column; gap:10px; align-items:center; flex: 1; }\n  .board .iconRow .pair .logo { width: 80px; }\n  .board .iconRow .pair .lbl { font-size: 9.5px; letter-spacing: 0.32em; text-transform: uppercase; color: var(--evergreen); }\n  .board .iconRow .sq { flex: 1; aspect-ratio:1; background: var(--evergreen); display:flex; align-items:center; justify-content:center; padding: 18%; box-sizing: border-box; }\n  .board .iconRow .sq .logo { width: 100%; }\n\n  .board .guidegrid { display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }\n  .board .guidecard { display:flex; flex-direction:column; gap: 8px; }\n  .board .guidecard .ill { width: 100%; aspect-ratio: 1.15/1; display:flex; align-items:center; justify-content:center; position:relative; border: 1px solid var(--rule-soft); padding: 14px; box-sizing: border-box; background: var(--ivory); }\n  .board .guidecard .cap { font-size: 10.5px; line-height: 1.45; color: var(--evergreen); }\n  .board .guidecard .cap .strong { font-weight: 600; }\n\n  /* ============ Generic ============ */\n  .grid-2 { display:grid; grid-template-columns: 1fr 1fr; gap: 56px; }\n  .grid-3 { display:grid; grid-template-columns: repeat(3, 1fr); gap: 32px; }\n  .stack-8 { display:flex; flex-direction:column; gap: 8px; }\n  .stack-12 { display:flex; flex-direction:column; gap: 12px; }\n  .stack-16 { display:flex; flex-direction:column; gap: 16px; }\n  .stack-24 { display:flex; flex-direction:column; gap: 24px; }\n  .stack-40 { display:flex; flex-direction:column; gap: 40px; }\n\n  /* ============ Logo system page ============ */\n  .logo-system .page-pad { display:grid; grid-template-rows: auto auto auto auto auto 1fr auto; gap: 28px; }\n  .logo-hero {\n    background: var(--sage);\n    aspect-ratio: 2.6 / 1;\n    display:flex; align-items:center; justify-content:center;\n    padding: 30px;\n    box-sizing: border-box;\n  }\n  .logo-hero .logo { width: 32%; }\n\n  .lockup-row { display:grid; grid-template-columns: 1fr 1fr 1fr; gap: 20px; }\n  .lockup {\n    aspect-ratio: 1 / 1;\n    border: 1px solid var(--rule);\n    display:flex; align-items:center; justify-content:center;\n    padding: 14%;\n    box-sizing: border-box;\n    position: relative;\n  }\n  .lockup.ivory { background: var(--ivory); }\n  .lockup.sage  { background: var(--sage); }\n  .lockup.green { background: var(--evergreen); }\n  .lockup .logo { width: 100%; }\n  .lockup.icononly .logo { width: 55%; }\n  .lockup .cap {\n    position: absolute; bottom: 14px; left: 0; right: 0;\n    font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase;\n    color: currentColor; opacity: 0.7; text-align: center;\n  }\n  .lockup.ivory .cap { color: var(--evergreen); }\n  .lockup.sage  .cap, .lockup.green .cap { color: var(--ivory); }\n\n  /* ============ Color page ============ */\n  .color-grid {\n    display: grid;\n    grid-template-columns: repeat(4, 1fr);\n    gap: 18px;\n  }\n  .color-card { display:flex; flex-direction:column; gap: 14px; }\n  .color-card .chip {\n    height: 240px;\n    border: 1px solid var(--rule-soft);\n  }\n  .color-card .nm { font-family: var(--serif); font-weight: 400; font-size: 22px; color: var(--evergreen); }\n  .color-card .kv { display:grid; grid-template-columns: 60px 1fr; gap: 4px 16px; font-size: 11.5px; color: var(--evergreen); line-height: 1.5;}\n  .color-card .kv .k { color: var(--stone); letter-spacing: 0.18em; text-transform: uppercase; font-size: 10px; align-self: center; }\n\n  .tints { display:grid; grid-template-columns: repeat(5, 1fr); gap: 0; }\n  .tints .t { height: 80px; display:flex; align-items: flex-end; padding: 8px 10px; font-size: 9.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--evergreen); }\n\n  .ratio-row { display:grid; grid-template-columns: 6fr 3fr 2fr 1fr; height: 56px; border: 1px solid var(--rule-soft); }\n  .ratio-row > div { display:flex; align-items:center; justify-content:center; font-size: 10.5px; letter-spacing: 0.2em; text-transform: uppercase; }\n\n  /* ============ Type page ============ */\n  .type-hero {\n    display: grid;\n    grid-template-columns: 1.2fr 1fr;\n    gap: 40px;\n    align-items: end;\n  }\n  .type-hero .big {\n    font-family: var(--serif);\n    font-weight: 300;\n    font-size: 220px;\n    line-height: 0.85;\n    color: var(--evergreen);\n    letter-spacing: -0.02em;\n  }\n  .type-hero .big em { font-style: italic; }\n  .type-spec {\n    border-top: 1px solid var(--rule);\n    padding-top: 18px;\n    display:flex; flex-direction: column; gap: 8px;\n  }\n  .type-spec .name { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: 28px; color: var(--evergreen); }\n  .type-spec .row { font-size: 11px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); }\n\n  .specimen-row { display: grid; grid-template-columns: 130px 1fr; gap: 24px; align-items: baseline; padding: 12px 0; border-top: 1px solid var(--rule-soft); }\n  .specimen-row .lab { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: var(--stone); }\n  .specimen-row .smp { color: var(--evergreen); }\n  .smp.serif-300-64 { font-family: var(--serif); font-weight: 300; font-size: 64px; line-height: 1; }\n  .smp.serif-400-40 { font-family: var(--serif); font-weight: 400; font-size: 40px; line-height: 1.05; }\n  .smp.serif-i-400-28 { font-family: var(--serif); font-weight: 400; font-style: italic; font-size: 28px; line-height: 1.05; }\n  .smp.sans-700-20 { font-weight: 700; font-size: 20px; letter-spacing: 0.02em; }\n  .smp.sans-500-13u { font-weight: 500; font-size: 13px; letter-spacing: 0.32em; text-transform: uppercase; }\n  .smp.sans-400-15 { font-weight: 400; font-size: 15px; line-height: 1.6; }\n  .smp.sans-400-12 { font-weight: 400; font-size: 12px; line-height: 1.65; color: var(--evergreen-80); }\n\n  .alphabet { font-family: var(--serif); font-weight: 300; font-size: 32px; color: var(--evergreen); letter-spacing: 0.04em; line-height: 1.25; }\n  .alphabet .small { display:block; font-size: 24px; }\n  .alphabet .num { display:block; font-weight: 400; font-size: 26px; }\n\n  /* ============ Applications ============ */\n  .apps-grid { display:grid; grid-template-columns: 1.25fr 1fr; gap: 28px; }\n  .apps-grid .col { display:flex; flex-direction:column; gap: 24px; }\n  .mock { background: var(--ivory); border: 1px solid var(--rule-soft); overflow:hidden; position:relative; }\n\n  .biz-card { aspect-ratio: 1.75/1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap: 18px; background: var(--sage); color: var(--ivory); padding: 6% 8%; box-sizing: border-box; }\n  .biz-card .logo { width: 35%; }\n  .biz-card .name { font-size: 9px; letter-spacing: 0.32em; text-transform: uppercase; text-align: center;}\n  .biz-card .name span { display:block; font-family: var(--serif); font-style: italic; font-size: 14px; letter-spacing: 0.02em; text-transform: none; opacity: 0.9; margin-top: 2px; }\n\n  .letterhead { aspect-ratio: 0.77 / 1; padding: 24px 26px; box-sizing: border-box; background: var(--paper); display:flex; flex-direction:column; gap: 16px; }\n  .letterhead .head { display:flex; justify-content:space-between; align-items:center; }\n  .letterhead .head .logo { width: 14%; }\n  .letterhead .head .right { text-align:right; font-size: 8.5px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--stone); line-height: 1.7; }\n  .letterhead .body-lines { display:flex; flex-direction:column; gap: 6px; }\n  .letterhead .body-lines span { display:block; height: 5px; background: var(--stone-40); opacity: 0.45; border-radius: 2px; }\n  .letterhead .body-lines span.short { width: 60%; }\n  .letterhead .foot { margin-top:auto; display:flex; justify-content:center; }\n  .letterhead .foot .logo { width: 22%; }\n\n  .social { aspect-ratio: 1/1; background: var(--evergreen); display:flex; align-items:center; justify-content:center; flex-direction:column; gap: 18px; color: var(--ivory); padding: 12%; box-sizing: border-box;}\n  .social .logo { width: 50%; }\n  .social .title { font-family: var(--serif); font-style: italic; font-weight: 300; font-size: 22px; text-align:center; }\n  .social .tag { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; padding-top: 12px; border-top: 1px solid rgba(239,234,225,0.4); align-self: stretch; text-align:center; }\n\n  .stamp { aspect-ratio: 1/1; border: 1.5px solid var(--evergreen); border-radius: 50%; display:flex; align-items:center; justify-content:center; flex-direction:column; gap: 10px; color: var(--evergreen); background: var(--paper); padding: 22%; box-sizing: border-box;}\n  .stamp .logo { width: 70%; }\n  .stamp .est { font-size: 9px; letter-spacing: 0.34em; text-transform: uppercase; }\n\n  /* Don't markers */\n  .donot {\n    position: absolute; left: 50%; top: 50%; transform: translate(-50%, -50%);\n    width: 52px; height: 52px; border: 2px solid var(--evergreen); border-radius: 50%;\n    background: var(--paper); display:flex; align-items:center; justify-content:center;\n  }\n  .donot svg { width: 28px; height: 28px; color: var(--evergreen); }\n\n  /* Clear-space illustration */\n  .clearspace {\n    width: 100%; aspect-ratio: 1.05/1;\n    position: relative;\n    background: var(--ivory);\n    border: 1px solid var(--rule-soft);\n  }\n  .clearspace .frame {\n    position: absolute; inset: 16%;\n    border: 1px dashed var(--rule);\n    display: flex; align-items: center; justify-content: center;\n  }\n  .clearspace .frame .logo { width: 70%; }\n  .clearspace .tag {\n    position: absolute; font-size: 10px; letter-spacing: 0.2em; text-transform: uppercase;\n    color: var(--stone);\n  }\n  .clearspace .tag.top { top: 6%; left: 50%; transform: translateX(-50%); }\n  .clearspace .tag.left { left: 6%; top: 50%; transform: translateY(-50%) rotate(-90deg); transform-origin: center; }\n  .clearspace .tag.right { right: 6%; top: 50%; transform: translateY(-50%) rotate(90deg); transform-origin: center; }\n  .clearspace .tag.bottom { bottom: 6%; left: 50%; transform: translateX(-50%); }\n  .clearspace .marker {\n    position: absolute; font-family: var(--serif); font-style: italic; font-weight: 400; font-size: 16px; color: var(--sage);\n  }\n  .clearspace .marker.tl { top: 16%; left: 16%; transform: translate(-50%, -50%); }\n  .clearspace .marker.tr { top: 16%; right: 16%; transform: translate(50%, -50%); }\n  .clearspace .marker.bl { bottom: 16%; left: 16%; transform: translate(-50%, 50%); }\n  .clearspace .marker.br { bottom: 16%; right: 16%; transform: translate(50%, 50%); }\n\n  /* Min sizes */\n  .minsizes { display:flex; align-items: flex-end; justify-content: center; gap: 32px; padding: 24px; background: var(--ivory); border: 1px solid var(--rule-soft); height: 100%; box-sizing: border-box; }\n  .minsizes .ms { display:flex; flex-direction:column; gap: 10px; align-items: center; }\n  .minsizes .ms .logo { width: var(--w); }\n\n  /* Print */\n  @media print {\n    body { background: #fff; }\n    .doc { margin: 0; padding: 0; max-width: none; gap: 0; }\n    .page { box-shadow: none; page-break-after: always; aspect-ratio: auto; height: 100vh; }\n    .page.wide { height: auto; min-height: 100vh; }\n  }\n\n  @media (max-width: 900px) {\n    .doc { padding: 0 16px 40px; margin: 16px auto; }\n    .page-pad { padding: 32px 28px; }\n    .type-hero .big { font-size: 120px; }\n    .color-grid { grid-template-columns: 1fr 1fr; }\n    .toc h1 { font-size: 56px; }\n  }\n<\u002Fstyle>\n<\u002Fhead>\n<body>\n\n<div class=\"doc\" data-screen-label=\"Sonder Brand Guidelines\">\n\n  <!-- 01 — COVER -->\n  <section class=\"page tall cover\" data-screen-label=\"01 Cover\">\n    <div class=\"page-pad\">\n      <div class=\"top\">\n        <div class=\"eyebrow\" style=\"opacity:0.85;\">Sonder Operations<\u002Fdiv>\n        <div class=\"eyebrow\" style=\"opacity:0.85;\">Vol. 01 · 2026<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"mid\">\n        <div class=\"logo full ivory\"><\u002Fdiv>\n        <div class=\"kicker\">Brand &nbsp;·&nbsp; Identity &nbsp;·&nbsp; Guidelines<\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"bot\">\n        <div>Internal Reference<\u002Fdiv>\n        <div>Issued 20 · May · 2026<\u002Fdiv>\n        <div>Draft v1<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 02 — CONTENTS -->\n  <section class=\"page tall toc\" data-screen-label=\"02 Contents\">\n    <div class=\"page-pad\">\n      <div class=\"stack-24\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">Contents<\u002Fdiv>\n        <h1>A guide to <em>Sonder<\u002Fem><br>Operations.<\u002Fh1>\n        <p class=\"lede\">A short book of standards for the marks, palette, and typography that carry our name — written so anyone using the brand can do so with confidence and consistency.<\u002Fp>\n      <\u002Fdiv>\n\n      <div>\n        <div class=\"toc-row\"><div class=\"num\">01<\u002Fdiv><div class=\"tt\"><em>The<\u002Fem> Brand Board<\u002Fdiv><div class=\"pg\">p. 03<\u002Fdiv><\u002Fdiv>\n        <div class=\"toc-row\"><div class=\"num\">02<\u002Fdiv><div class=\"tt\">Logo System<\u002Fdiv><div class=\"pg\">p. 04<\u002Fdiv><\u002Fdiv>\n        <div class=\"toc-row\"><div class=\"num\">03<\u002Fdiv><div class=\"tt\">Logo <em>Usage<\u002Fem><\u002Fdiv><div class=\"pg\">p. 05<\u002Fdiv><\u002Fdiv>\n        <div class=\"toc-row\"><div class=\"num\">04<\u002Fdiv><div class=\"tt\">Color Palette<\u002Fdiv><div class=\"pg\">p. 06<\u002Fdiv><\u002Fdiv>\n        <div class=\"toc-row\"><div class=\"num\">05<\u002Fdiv><div class=\"tt\">Typography<\u002Fdiv><div class=\"pg\">p. 07<\u002Fdiv><\u002Fdiv>\n        <div class=\"toc-row\"><div class=\"num\">06<\u002Fdiv><div class=\"tt\">Applications<\u002Fdiv><div class=\"pg\">p. 08<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n        <span>Sonder Operations<\u002Fspan>\n        <span>Contents<\u002Fspan>\n        <span>02<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 03 — BRAND BOARD -->\n  <section class=\"page wide board\" data-screen-label=\"03 Brand Board\">\n    <div class=\"page-pad\">\n\n      <!-- LEFT -->\n      <div class=\"col\">\n        <div class=\"titlewrap\">\n          <div class=\"label\" style=\"letter-spacing:.4em;\">SONDER OPERATIONS<\u002Fdiv>\n          <hr>\n        <\u002Fdiv>\n\n        <div class=\"hero-mark\">\n          <div class=\"logo full light\"><\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"thin\">\n\n        <div class=\"stack-16\">\n          <h3>Color Palette<\u002Fh3>\n          <div class=\"palette\">\n            <div class=\"swatch\">\n              <div class=\"chip\" style=\"background:var(--sage);\"><\u002Fdiv>\n              <div class=\"nm\">Sage Green<\u002Fdiv>\n              <div class=\"hex\">#859473<\u002Fdiv>\n              <div class=\"hex\">RGB 133·148·115<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"swatch\">\n              <div class=\"chip\" style=\"background:var(--ivory);\"><\u002Fdiv>\n              <div class=\"nm\">Warm Ivory<\u002Fdiv>\n              <div class=\"hex\">#EFEAE1<\u002Fdiv>\n              <div class=\"hex\">RGB 239·234·225<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"swatch\">\n              <div class=\"chip\" style=\"background:var(--evergreen);\"><\u002Fdiv>\n              <div class=\"nm\">Dark Evergreen<\u002Fdiv>\n              <div class=\"hex\">#2D3D32<\u002Fdiv>\n              <div class=\"hex\">RGB 45·61·50<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"swatch\">\n              <div class=\"chip\" style=\"background:var(--stone);\"><\u002Fdiv>\n              <div class=\"nm\">Stone<\u002Fdiv>\n              <div class=\"hex\">#7B7B73<\u002Fdiv>\n              <div class=\"hex\">RGB 123·123·115<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"thin\">\n\n        <div class=\"stack-12\">\n          <h3 style=\"margin-bottom:0;\">Typography<\u002Fh3>\n          <div class=\"specimen\">\n            <div class=\"label-tiny\">Display · Cormorant Garamond<\u002Fdiv>\n            <div class=\"typesample\">Aa <em>Bb<\u002Fem><\u002Fdiv>\n            <div class=\"label-tiny\" style=\"margin-top:6px;\">Body · Source Sans 3<\u002Fdiv>\n            <div class=\"sansample\">Sonder · 0123<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- MID -->\n      <div class=\"col\">\n        <div class=\"titlewrap\">\n          <h3 style=\"font-size:28px;\">Logo Variations<\u002Fh3>\n          <hr>\n        <\u002Fdiv>\n\n        <div class=\"variations\">\n          <div class=\"full\"><div class=\"logo full light\"><\u002Fdiv><\u002Fdiv>\n          <div class=\"stacked\"><div class=\"logo icon light\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"thin\">\n\n        <div class=\"stack-16\">\n          <h3>Logo Anatomy<\u002Fh3>\n          <p class=\"body\" style=\"text-align:center; font-size:12.5px; max-width:none;\">\n            The mark is an open circle bisected by a stylised\n            <em style=\"font-family:var(--serif); font-size:14px;\">S<\u002Fem> — a\n            soft contour that reads as both letterform and the meeting of two\n            halves. The wordmark sits below in widely tracked serif capitals,\n            with “Operations” as a quiet subscript.\n          <\u002Fp>\n          <div class=\"meta-row\" style=\"font-size:9.5px; letter-spacing:0.32em; text-align:center; color:var(--stone); text-transform:uppercase;\">\n            Source Sans 3 · Cormorant Garamond\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- RIGHT -->\n      <div class=\"col\">\n        <div class=\"titlewrap\">\n          <h3 style=\"font-size:28px;\">Logo on Color<\u002Fh3>\n          <hr>\n        <\u002Fdiv>\n\n        <div class=\"onColor\">\n          <div class=\"oc\">\n            <div class=\"square\" style=\"background:var(--sage);\">\n              <div class=\"logo full ivory\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"nm\">Sage Green<\u002Fdiv>\n            <div class=\"hex\">#859473<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"oc\">\n            <div class=\"square\" style=\"background:var(--ivory);\">\n              <div class=\"logo full light\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"nm\">Warm Ivory<\u002Fdiv>\n            <div class=\"hex\">#EFEAE1<\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"oc\">\n            <div class=\"square\" style=\"background:var(--evergreen);\">\n              <div class=\"logo full ivory\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"nm\">Dark Evergreen<\u002Fdiv>\n            <div class=\"hex\">#2D3D32<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"thin\">\n\n        <div class=\"stack-16\">\n          <h3>Icon Only<\u002Fh3>\n          <div class=\"iconRow\">\n            <div class=\"pair\">\n              <div class=\"logo icon light\"><\u002Fdiv>\n              <div class=\"lbl\">On Light<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"sq\">\n              <div class=\"logo icon ivory\"><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n\n        <hr class=\"thin\">\n\n        <div class=\"stack-16\">\n          <h3>Brand Guides<\u002Fh3>\n          <div class=\"guidegrid\">\n            <div class=\"guidecard\">\n              <div class=\"ill\">\n                <div class=\"logo icon light\" style=\"width:60%;\"><\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"cap\"><span class=\"strong\">Clear space<\u002Fspan> — maintain margin equal to the height of the “S” on all sides.<\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"guidecard\">\n              <div class=\"ill\">\n                <div class=\"logo full light\" style=\"width:70%; transform: scaleX(1.4); transform-origin:center;\"><\u002Fdiv>\n                <div class=\"donot\">\n                  <svg viewBox=\"0 0 24 24\"><line x1=\"4\" y1=\"20\" x2=\"20\" y2=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fline><\u002Fsvg>\n                <\u002Fdiv>\n              <\u002Fdiv>\n              <div class=\"cap\"><span class=\"strong\">Do not stretch,<\u002Fspan> distort, or recolor the mark outside the approved palette.<\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n      <span>01 · Brand Board<\u002Fspan>\n      <span>Sonder Operations · Brand Guidelines<\u002Fspan>\n      <span>03<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 04 — LOGO SYSTEM -->\n  <section class=\"page tall logo-system\" data-screen-label=\"04 Logo System\">\n    <div class=\"page-pad\">\n\n      <div class=\"stack-12\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">02 · Logo System<\u002Fdiv>\n        <h1 class=\"section\">The Mark.<\u002Fh1>\n        <p class=\"lede\">A circular crest divided by an S-curve — quiet, considered, complete. The wordmark sits below in measured capitals, with an italic descriptor that softens the geometry.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Primary Logo<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"logo-hero\">\n        <div class=\"logo full ivory\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Lockups &amp; Variations<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"lockup-row\">\n        <div class=\"lockup ivory\">\n          <div class=\"logo full light\"><\u002Fdiv>\n          <div class=\"cap\">Primary · On Light<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lockup sage\">\n          <div class=\"logo full ivory\"><\u002Fdiv>\n          <div class=\"cap\">Reversed · On Sage<\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"lockup green icononly\">\n          <div class=\"logo icon ivory\"><\u002Fdiv>\n          <div class=\"cap\">Icon Only · On Dark<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n      <span>02 · Logo System<\u002Fspan>\n      <span>Sonder Operations · Brand Guidelines<\u002Fspan>\n      <span>04<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 05 — LOGO USAGE -->\n  <section class=\"page tall\" data-screen-label=\"05 Logo Usage\">\n    <div class=\"page-pad stack-40\">\n\n      <div class=\"stack-12\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">03 · Logo Usage<\u002Fdiv>\n        <h1 class=\"section\">Clear space, <em>protection<\u002Fem>.<\u002Fh1>\n        <p class=\"lede\">Give the mark room to breathe. The exclusion zone is measured by the cap-height of the “S” in the wordmark — never less, ideally more.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"grid-2\" style=\"gap:40px;\">\n        <div class=\"stack-16\">\n          <div class=\"label\">Clear Space<\u002Fdiv>\n          <div class=\"clearspace\">\n            <div class=\"frame\">\n              <div class=\"logo full light\"><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"marker tl\">S<\u002Fdiv>\n            <div class=\"marker tr\">S<\u002Fdiv>\n            <div class=\"marker bl\">S<\u002Fdiv>\n            <div class=\"marker br\">S<\u002Fdiv>\n            <div class=\"tag top\">↕ S height<\u002Fdiv>\n            <div class=\"tag bottom\">↕ S height<\u002Fdiv>\n            <div class=\"tag left\">↔ S width<\u002Fdiv>\n            <div class=\"tag right\">↔ S width<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"body\">Use the height of the letter “S” as a minimum margin on all four sides of the lockup. In tight applications — favicons, badges, social avatars — the icon-only mark may be used in place of the full lockup.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"stack-16\">\n          <div class=\"label\">Minimum Sizes<\u002Fdiv>\n          <div class=\"minsizes\">\n            <div class=\"ms\"><div class=\"logo icon light\" style=\"--w:24px;\"><\u002Fdiv><div class=\"meta\">16 PX · DIGITAL<\u002Fdiv><\u002Fdiv>\n            <div class=\"ms\"><div class=\"logo icon light\" style=\"--w:56px;\"><\u002Fdiv><div class=\"meta\">32 PX · UI<\u002Fdiv><\u002Fdiv>\n            <div class=\"ms\"><div class=\"logo full light\" style=\"--w:140px;\"><\u002Fdiv><div class=\"meta\">24 PT · PRINT<\u002Fdiv><\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"body\">The icon may shrink to 16 px; the full lockup should not appear smaller than 24 pt in print or 96 px in digital. Below those sizes, switch to the icon-only mark.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Misuses<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"grid-3\">\n        <div class=\"stack-12\">\n          <div class=\"mock\" style=\"aspect-ratio: 1.3/1; display:flex; align-items:center; justify-content:center; padding: 12%; box-sizing: border-box;\">\n            <div class=\"logo full light\" style=\"transform: scaleX(1.6); transform-origin:center;\"><\u002Fdiv>\n            <div class=\"donot\">\n              <svg viewBox=\"0 0 24 24\"><line x1=\"4\" y1=\"20\" x2=\"20\" y2=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"label\">Don't · Stretch<\u002Fdiv>\n          <p class=\"body\">Never distort the proportions of the mark by scaling on one axis.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"stack-12\">\n          <div class=\"mock\" style=\"aspect-ratio: 1.3/1; display:flex; align-items:center; justify-content:center; padding: 12%; box-sizing: border-box; background: linear-gradient(135deg, #ff7e7e, #6f8bff);\">\n            <div class=\"logo full ivory\"><\u002Fdiv>\n            <div class=\"donot\">\n              <svg viewBox=\"0 0 24 24\"><line x1=\"4\" y1=\"20\" x2=\"20\" y2=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"label\">Don't · Recolor<\u002Fdiv>\n          <p class=\"body\">Use only the approved palette. No gradients, no off-brand color.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"stack-12\">\n          <div class=\"mock\" style=\"aspect-ratio: 1.3/1; display:flex; align-items:center; justify-content:center; padding: 12%; box-sizing: border-box; background: repeating-linear-gradient(45deg, #c8b89a 0 10px, #b9a78a 10px 20px);\">\n            <div class=\"logo full light\"><\u002Fdiv>\n            <div class=\"donot\">\n              <svg viewBox=\"0 0 24 24\"><line x1=\"4\" y1=\"20\" x2=\"20\" y2=\"4\" stroke=\"currentColor\" stroke-width=\"2\"><\u002Fline><\u002Fsvg>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <div class=\"label\">Don't · Bury<\u002Fdiv>\n          <p class=\"body\">Avoid placing the mark on busy backgrounds or low-contrast surfaces.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n      <span>03 · Logo Usage<\u002Fspan>\n      <span>Sonder Operations · Brand Guidelines<\u002Fspan>\n      <span>05<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 06 — COLOR -->\n  <section class=\"page tall\" data-screen-label=\"06 Color\">\n    <div class=\"page-pad stack-40\">\n      <div class=\"stack-12\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">04 · Color<\u002Fdiv>\n        <h1 class=\"section\">Quiet greens, <em>warm<\u002Fem> ground.<\u002Fh1>\n        <p class=\"lede\">The palette is grounded in sage and evergreen, with warm ivory and stone for contrast. Secondary navy and tan offer flexibility for collateral and formal applications.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Primary Palette<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"color-grid\">\n        <div class=\"color-card\">\n          <div class=\"chip\" style=\"background:var(--sage);\"><\u002Fdiv>\n          <div class=\"nm\">Sage Green<\u002Fdiv>\n          <div class=\"kv\">\n            <div class=\"k\">Hex<\u002Fdiv><div>#859473<\u002Fdiv>\n            <div class=\"k\">RGB<\u002Fdiv><div>133 · 148 · 115<\u002Fdiv>\n            <div class=\"k\">CMYK<\u002Fdiv><div>42 · 25 · 50 · 6<\u002Fdiv>\n            <div class=\"k\">Pantone<\u002Fdiv><div>5773 C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"color-card\">\n          <div class=\"chip\" style=\"background:var(--ivory);\"><\u002Fdiv>\n          <div class=\"nm\">Warm Ivory<\u002Fdiv>\n          <div class=\"kv\">\n            <div class=\"k\">Hex<\u002Fdiv><div>#EFEAE1<\u002Fdiv>\n            <div class=\"k\">RGB<\u002Fdiv><div>239 · 234 · 225<\u002Fdiv>\n            <div class=\"k\">CMYK<\u002Fdiv><div>4 · 5 · 11 · 0<\u002Fdiv>\n            <div class=\"k\">Pantone<\u002Fdiv><div>7527 C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"color-card\">\n          <div class=\"chip\" style=\"background:var(--evergreen);\"><\u002Fdiv>\n          <div class=\"nm\">Dark Evergreen<\u002Fdiv>\n          <div class=\"kv\">\n            <div class=\"k\">Hex<\u002Fdiv><div>#2D3D32<\u002Fdiv>\n            <div class=\"k\">RGB<\u002Fdiv><div>45 · 61 · 50<\u002Fdiv>\n            <div class=\"k\">CMYK<\u002Fdiv><div>75 · 50 · 70 · 60<\u002Fdiv>\n            <div class=\"k\">Pantone<\u002Fdiv><div>5535 C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <div class=\"color-card\">\n          <div class=\"chip\" style=\"background:var(--stone);\"><\u002Fdiv>\n          <div class=\"nm\">Stone<\u002Fdiv>\n          <div class=\"kv\">\n            <div class=\"k\">Hex<\u002Fdiv><div>#7B7B73<\u002Fdiv>\n            <div class=\"k\">RGB<\u002Fdiv><div>123 · 123 · 115<\u002Fdiv>\n            <div class=\"k\">CMYK<\u002Fdiv><div>52 · 42 · 50 · 18<\u002Fdiv>\n            <div class=\"k\">Pantone<\u002Fdiv><div>Cool Gray 9 C<\u002Fdiv>\n          <\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Secondary &amp; Tints<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"grid-2\" style=\"gap:40px;\">\n        <div class=\"stack-16\">\n          <div class=\"label\">Sage — Tint Scale<\u002Fdiv>\n          <div class=\"tints\">\n            <div class=\"t\" style=\"background:var(--sage-10);\">10%<\u002Fdiv>\n            <div class=\"t\" style=\"background:var(--sage-30);\">30%<\u002Fdiv>\n            <div class=\"t\" style=\"background:var(--sage-60);\">60%<\u002Fdiv>\n            <div class=\"t\" style=\"background:var(--sage-80);\">80%<\u002Fdiv>\n            <div class=\"t\" style=\"background:var(--sage); color:var(--ivory);\">100%<\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"body\">Use tints to create depth within sage-led layouts — surfaces, dividers, and quiet backgrounds. Avoid using tints below 30% for type.<\u002Fp>\n        <\u002Fdiv>\n\n        <div class=\"stack-16\">\n          <div class=\"label\">Secondary — Special Use<\u002Fdiv>\n          <div style=\"display:grid; grid-template-columns: 1fr 1fr; gap: 14px;\">\n            <div class=\"color-card\">\n              <div class=\"chip\" style=\"background:var(--navy); height: 130px;\"><\u002Fdiv>\n              <div class=\"nm\" style=\"font-size:18px;\">Midnight Navy<\u002Fdiv>\n              <div class=\"kv\"><div class=\"k\">Hex<\u002Fdiv><div>#1F2451<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n            <div class=\"color-card\">\n              <div class=\"chip\" style=\"background:var(--tan); height: 130px;\"><\u002Fdiv>\n              <div class=\"nm\" style=\"font-size:18px;\">Soft Tan<\u002Fdiv>\n              <div class=\"kv\"><div class=\"k\">Hex<\u002Fdiv><div>#D4B89C<\u002Fdiv><\u002Fdiv>\n            <\u002Fdiv>\n          <\u002Fdiv>\n          <p class=\"body\">Reserved for secondary collateral: formal print, partner co-branding, packaging accents. Pair tan with navy as a closed system, separate from the primary sage palette.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"rule-title\" style=\"color:var(--evergreen);\">\n        <div class=\"line\"><\u002Fdiv>\n        <div class=\"t\">Usage Ratio<\u002Fdiv>\n        <div class=\"line\"><\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"ratio-row\">\n        <div style=\"background:var(--ivory); color:var(--evergreen);\">60 · Ivory<\u002Fdiv>\n        <div style=\"background:var(--sage); color:var(--ivory);\">25 · Sage<\u002Fdiv>\n        <div style=\"background:var(--evergreen); color:var(--ivory);\">10 · Evergreen<\u002Fdiv>\n        <div style=\"background:var(--stone); color:var(--ivory);\">5<\u002Fdiv>\n      <\u002Fdiv>\n      <p class=\"body\">A guide ratio for everyday use: ivory carries the page, sage carries the brand, evergreen anchors hierarchy, stone supports.<\u002Fp>\n    <\u002Fdiv>\n    <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n      <span>04 · Color<\u002Fspan>\n      <span>Sonder Operations · Brand Guidelines<\u002Fspan>\n      <span>06<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 07 — TYPOGRAPHY -->\n  <section class=\"page tall\" data-screen-label=\"07 Typography\">\n    <div class=\"page-pad stack-40\">\n      <div class=\"stack-12\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">05 · Typography<\u002Fdiv>\n        <h1 class=\"section\">Set in <em>two<\u002Fem> voices.<\u002Fh1>\n        <p class=\"lede\">A high-contrast serif carries identity and presence; a humanist sans handles the everyday work of reading. Together they hold the tone — refined, but never precious.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"type-hero\">\n        <div class=\"big\">Aa <em>Bb<\u002Fem><\u002Fdiv>\n        <div class=\"type-spec\">\n          <div class=\"name\">Cormorant Garamond<\u002Fdiv>\n          <div class=\"row\">Display · Serif<\u002Fdiv>\n          <div class=\"row\">Light 300 · Regular 400 · Italic<\u002Fdiv>\n          <p class=\"body\" style=\"margin-top:8px;\">Used for titles, the wordmark, editorial moments and large numbers. Set in 2Fdiv>\n        <div class=\"specimen-row\"><div class=\"lab\">Lead · 20<\u002Fdiv><div class=\"smp sans-700-20\">Body lead-in for emphasis or call-out.<\u002Fdiv><\u002Fdiv>\n        <div class=\"specimen-row\"><div class=\"lab\">Body · 15<\u002Fdiv><div class=\"smp sans-400-15\">Body copy is set in Source Sans 3 Regular, with a line-height of 1.6 for comfortable reading at small and medium sizes.<\u002Fdiv><\u002Fdiv>\n        <div class=\"specimen-row\"><div class=\"lab\">Caption · 12<\u002Fdiv><div class=\"smp sans-400-12\">Captions and metadata sit at 12pt, with letter-spacing of 0.04em for legibility.<\u002Fdiv><\u002Fdiv>\n      <\u002Fdiv>\n\n    <\u002Fdiv>\n    <div class=\"pagefoot\" style=\"color:var(--evergreen);\">\n      <span>05 · Typography<\u002Fspan>\n      <span>Sonder Operations · Brand Guidelines<\u002Fspan>\n      <span>07<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fsection>\n\n  <!-- 08 — APPLICATIONS -->\n  <section class=\"page tall\" data-screen-label=\"08 Applications\">\n    <div class=\"page-pad stack-24\" style=\"height:100%;\">\n      <div class=\"stack-12\">\n        <div class=\"eyebrow\" style=\"color:var(--stone);\">06 · Applications<\u002Fdiv>\n        <h1 class=\"section\">The brand <em>in use<\u002Fem>.<\u002Fh1>\n        <p class=\"lede\">Sample applications across stationery, social, and signage. Treat these as a tone reference — every new piece begins from the same palette, type, and clear-space principles.<\u002Fp>\n      <\u002Fdiv>\n\n      <div class=\"apps-grid\">\n        <div class=\"col\">\n          <div class=\"mock biz-card\">\n            <div class=\"logo full ivory\"><\u002Fdiv>\n            <div class=\"name\">Avery Whitman <span>Director of Operations<\u002Fspan><\u002Fdiv>\n          <\u002Fdiv>\n\n          <div class=\"mock social\">\n            <div class=\"logo full ivory\"><\u002Fdiv>\n            <div class=\"title\">\"Quiet, considered work — done in full.\"<\u002Fdiv>\n            <div class=\"tag\">@SON
